services:
  warp:
    image: caomingjun/warp:latest
    restart: unless-stopped
    environment:
      WARP_SLEEP: "5"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv6.conf.all.disable_ipv6: 0
      net.ipv4.conf.all.src_valid_mark: 1
    volumes:
      - warp-data:/var/lib/cloudflare-warp

  enowxai:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - warp
    volumes:
      - enowxai-data:/root/.enowxai
      - enowxai-venv:/root/.local/lib/enowxai/auth/.venv
    expose:
      - "80"
      - "1430"
      - "1431"

volumes:
  warp-data:
  enowxai-data:
  enowxai-venv:
