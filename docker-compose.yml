services:
  warp:
    image: ghcr.io/mon-ius/docker-warp-socks:v5
    restart: unless-stopped
    expose:
      - "9091"

  enowxai:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - warp
    volumes:
      - enowxai-data:/root/.enowxai
      - enowxai-venv:/root/.local/lib/enowxai/auth/.venv
    expose:
      - "80"
      - "1430"
      - "1431"

volumes:
  enowxai-data:
  enowxai-venv:
